# docker-compose.yml
# This runs all your local services with ONE command: docker-compose up

version: '3.8'

services:

  # PostgreSQL — your main relational database
  # Stores users, agents, conversations, billing etc.
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: forgent
      POSTGRES_PASSWORD: forgent_secret
      POSTGRES_DB: forgent_db
    ports:
      - "5432:5432"          # your app connects on localhost:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data   # data persists even if container stops

  # Redis — for caching, sessions, and Celery task queue
  # Think of it as a super fast in-memory key-value store
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Qdrant — your vector database
  # Stores embeddings (numerical representations of text) for RAG
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"          # REST API
      - "6334:6334"          # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
